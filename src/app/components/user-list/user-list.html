<div class="container-fluid mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>User List</h2>

    <button class="btn btn-info" (click)="loadUsers()" [disabled]="isLoading">
      <span *ngIf="!isLoading">Refresh</span>
      <span *ngIf="isLoading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        Loading...
      </span>
    </button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
    {{ errorMessage }}
  </div>

  <div *ngIf="isLoading" class="text-center">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="!isLoading && viewMode === 'table'" class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Full Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Age</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ user.getFullName() }}</td>
          <td>{{ user.userEmail }}</td>
          <td>{{ user.userTel }}</td>
          <td>
            <span class="badge bg-info">{{ getUserAge(user) }} years</span>
          </td>
          <td>
            <button class="btn btn-sm btn-warning me-1" title="Edit">
              Edit
            </button>
            <button class="btn btn-sm btn-danger" (click)="deleteUser(user.userId)" title="Delete">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="users.length === 0" class="alert alert-info">
      No users found.
    </div>
  </div>

</div>
